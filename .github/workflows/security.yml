name: Security Scan

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly-disclosed CVEs
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # required to upload SARIF results to GitHub Security tab

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Go vulnerability scan — govulncheck (Go's official CVE database)
  # ─────────────────────────────────────────────────────────────────────────────
  go-vulncheck:
    name: Go — govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Go SAST — gosec (static analysis for common Go security issues)
  # ─────────────────────────────────────────────────────────────────────────────
  gosec:
    name: Go — gosec SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gosec
        uses: securego/gosec@master
        with:
          # Output SARIF so findings appear in GitHub Security → Code scanning
          args: "-no-fail -fmt sarif -out gosec-results.sarif ./..."

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
          category: gosec

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Frontend dependency audit — npm audit
  # ─────────────────────────────────────────────────────────────────────────────
  npm-audit:
    name: Frontend — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run npm audit (high + critical only)
        # --audit-level=high fails the job only for high/critical vulnerabilities.
        # Remove the flag to fail on moderate as well.
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Container image scan — Trivy
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-image:
    name: Container — Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build --platform linux/amd64 -t helmsights:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: helmsights:scan
          format: sarif
          output: trivy-image.sarif
          # Fail on CRITICAL and HIGH severity CVEs
          severity: CRITICAL,HIGH
          # Ignore unfixed CVEs (no patch available yet)
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Filesystem scan — Trivy (IaC misconfigs + dependency CVEs in source)
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-fs:
    name: Filesystem — Trivy fs scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Secret scanning — Gitleaks
  # ─────────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Gitleaks can scan all commits, not just HEAD
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. Dependency review — blocks PRs that introduce known-vulnerable packages
  #    (runs on pull_request events only)
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce HIGH or CRITICAL CVEs
          fail-on-severity: high
