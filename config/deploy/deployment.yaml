apiVersion: apps/v1
kind: Deployment
metadata:
  name: helmsight
  namespace: helmsight
  labels:
    app.kubernetes.io/name: helmsight
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helmsight
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helmsight
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: helmsight
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: helmsight
          image: sohaibmohd/helmsight:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HELMSIGHT_ADDR
              value: ":8080"
            - name: HELMSIGHT_DB
              value: "/data/helmsight.db"
            - name: HELMSIGHT_CLUSTER
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 2
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
      terminationGracePeriodSeconds: 30
